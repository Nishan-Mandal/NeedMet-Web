name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install dependencies (if your project has package.json)
      - name: Install Dependencies
        run: npm install

      # Build step (skip if static site without build)
      - name: Build Project
        run: npm run build

      # Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Deploy to Firebase Hosting
      - name: Deploy to Firebase
        run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_SERVICE_ACCOUNT_STARTUP20_5EAA7 }}"
